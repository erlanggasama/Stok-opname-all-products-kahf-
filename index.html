<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Erlangga Stock Opname + Barcode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        /* ... (CSS Anda sebelumnya tetap sama, saya tambahkan sedikit untuk scanner) ... */
        :root {
            --green-dark: #1e3d32;
            --green-medium: #2a5a48;
            --cream: #faf8f5;
            --white: #ffffff;
            --gold-light: #e8d5a8;
            --text-primary: #1e2b26;
            --shadow-md: 0 8px 32px rgba(30, 61, 50, 0.12);
            --radius: 16px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--cream); padding: 16px; }
        .header { background: var(--green-dark); color: white; padding: 24px; border-radius: var(--radius); margin-bottom: 24px; }
        .card { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow-md); margin-bottom: 16px; }
        
        /* Tambahan style untuk scanner */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; }
        #reader video { object-fit: cover; border-radius: 12px; }
        .scan-btn { background: var(--green-medium); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .close-scan { background: #d9534f; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>Stock Opname</h1>
        <p>Scan barcode EAN-13 untuk input stok</p>
    </div>

    <div class="card">
        <div class="form-group">
            <label class="form-label">Barcode Produk</label>
            <input type="text" id="barcodeInput" class="form-control" placeholder="Scan atau ketik manual..." readonly>
            <button id="startScanBtn" class="scan-btn">📷 Mulai Scan Kamera</button>
            <button id="stopScanBtn" class="scan-btn close-scan">❌ Tutup Kamera</button>
        </div>

        <!-- Area Kamera -->
        <div id="reader" style="display: none;"></div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const startBtn = document.getElementById('startScanBtn');
    const stopBtn = document.getElementById('stopScanBtn');
    const readerDiv = document.getElementById('reader');
    const barcodeInput = document.getElementById('barcodeInput');

    // Konfigurasi khusus untuk EAN-13
    const config = {
        fps: 10,
        qrbox: { width: 250, height: 150 }, // Kotak scan memanjang untuk barcode
        aspectRatio: 1.0,
        disableFlip: false,
        formatsToSupport: [ 
            Html5QrcodeSupportedFormats.EAN_13, 
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E
        ]
    };

    startBtn.addEventListener('click', () => {
        readerDiv.style.display = 'block';
        startBtn.style.display = 'none';
        stopBtn.style.display = 'block';

        // Meminta akses kamera belakang (environment)
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText, decodedResult) => {
                // Sukses Scan
                barcodeInput.value = decodedText;
                stopScanning();
                
                // Opsional: Mainkan suara beep
                playBeep();
                
                alert(`Barcode Terdeteksi: ${decodedText}`);
                // Di sini Anda bisa tambahkan logika AJAX untuk cek ke database
            },
            (errorMessage) => {
                // Gagal scan (biasanya diabaikan agar tidak spam console)
            }
        ).catch(err => {
            console.error("Error starting scanner", err);
            alert("Gagal mengakses kamera. Pastikan izin diberikan.");
        });
    });

    stopBtn.addEventListener('click', stopScanning);

    function stopScanning() {
        if (html5QrCode.isScanning) {
            html5QrCode.stop().then(() => {
                readerDiv.style.display = 'none';
                startBtn.style.display = 'block';
                stopBtn.style.display = 'none';
            }).catch(err => console.error("Failed to stop", err));
        }
    }

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Nada A5
        oscillator.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1); // Durasi 0.1 detik
    }
</script>

</body>
</html>
